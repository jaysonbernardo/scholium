{% extends "base.html" %}
{% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Login</title>
{% endblock %}

{% block body %}
<div class="container vh-100 d-flex align-items-center justify-content-center">
  <div class="row w-100">
    <div class="col-md-6 mx-auto">
      <div class="card shadow-lg">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h1 class="display-4 fw-bold text-primary">Scholium</h1>
            <p class="lead text-muted">C'mon, let's share notes!</p>
          </div>
          <form action="/login" method="post">
            <h2 class="text-center mb-4">Login</h2>
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" name="password" required>
            </div>
            <div class="d-grid mb-3">
              <input type="submit" class="btn btn-primary btn-lg" value="Login">
            </div>
            <p class="text-center">Don't have an account yet? <a href="{{ url_for('signup') }}" class="text-decoration-none">Sign up</a></p>
            {% if error %}
              <div class="alert alert-danger text-center" role="alert">{{ error }}</div>
            {% endif %}
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
