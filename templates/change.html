{% extends "base.html" %}
{% block head %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}">
    <title>Change Password</title>
</head>
{% endblock %}

{% block body%}
<div class="container vh-100 d-flex align-items-center justify-content-center">
  <div class="row w-100">
    <div class="col-md-6 mx-auto">
      <div class="card shadow-lg">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h1 class="display-4 fw-bold text-primary">Scholium</h1>
          </div>
          <form action="/change" method="post">
            <h2 class="text-center mb-4">Change Password</h2>
            <div class="mb-3">
              <label for="curpass" class="form-label">Current Password</label>
              <input type="password" class="form-control" name="curpass" required>
            </div>
            <div class="mb-3">
              <label for="newpass" class="form-label">New Password</label>
              <input type="password" class="form-control" name="newpass" required>
            </div>
            <div class="mb-3">
              <label for="newpass-confirm" class="form-label">Confirm New Password</label>
              <input type="password" class="form-control" name="newpass-confirm" required>
            </div>
            <div class="d-grid gap-2">
              <input type="submit" class="btn btn-primary" value="Confirm">
              <button type="button" class="btn btn-secondary" onclick="window.location.href='{{url_for('dashboard')}}';">Cancel</button>
            </div>
            {% if error %}
              <div class="alert alert-danger mt-3 text-center" role="alert">{{error}}</div>
            {% endif %}
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
